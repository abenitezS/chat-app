<div class="new-chat-container">
  <div class="page-header">
    <h2>Nuevo Chat</h2>
  </div>
  <div class="form-card">
    <form [formGroup]="formNuevoChat" (ngSubmit)="crearChat()" class="form">
      <div class="form-group">
        <label for="nombre">Nombre del contacto</label>
        <input
          id="nombre"
          type="text"
          placeholder="Ej: Juan García"
          formControlName="nombre"
          class="input"
          [class.error]="f['nombre'].invalid && f['nombre'].touched"
        />
        <ul class="errores">
          @for (errorNombre of erroresNombre; track $index) {
            <li>{{ errorNombre }}</li>
          }
        </ul>
      </div>

      <div class="form-group">
        <label>Selecciona un avatar</label>
        <div class="avatares-grid">
          @for (avatar of avatares; track avatar) {
            <button
              type="button"
              class="avatar-btn"
              [class.selected]="avatarSeleccionado === avatar"
              (click)="seleccionarAvatar(avatar)"
              title="Seleccionar avatar"
            >
              <img [src]="avatar" [alt]="'Avatar ' + $index" title="Avatar" />
            </button>
          }
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="cancelar()" [disabled]="loading">
          Cancelar
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="!formNuevoChat.valid || loading">
          @if (loading) {
            Creando...
          } @else {
            Crear chat
          }
        </button>
      </div>
    </form>
  </div>
</div>
